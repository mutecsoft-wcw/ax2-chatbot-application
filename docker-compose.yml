services:
  # 파이썬 백엔드 서비스
  backend:
    image: ${MUTECSOFT_GPU1_IP}:${MUTECSOFT_GPU1_PORT}/chatbot/backend:v1.0.9
    platform: linux/amd64
    restart: always
    build: ./ax2-chatbot-back
    container_name: ax2-chatbot-backend
    ports:
      - "18000:18000"
    networks:
      - my-network

  # 대국민챗봇 프론트엔드 서비스
  frontend-public:
    image: ${MUTECSOFT_GPU1_IP}:${MUTECSOFT_GPU1_PORT}/chatbot/frontend-public:v1.0.9
    platform: linux/amd64
    restart: always
    build: ./ax2-chatbot-front-public
    container_name: ax2-chatbot-frontend-public
    ports:
      - "13000:80"
    depends_on:
      - backend  # 백엔드가 먼저 실행된 후 프론트 실행
    networks:
      - my-network

  # 업무지원 프론트엔드 서비스
  frontend-internal:
    image: ${MUTECSOFT_GPU1_IP}:${MUTECSOFT_GPU1_PORT}/chatbot/frontend-internal:v1.0.9
    platform: linux/amd64
    restart: always
    build: ./ax2-chatbot-front-internal
    container_name: ax2-chatbot-frontend-internal
    ports:
      - "14000:80"
    depends_on:
      - backend
    networks:
      - my-network

  # Redis
  redis:
    image: ${MUTECSOFT_GPU1_IP}:${MUTECSOFT_GPU1_PORT}/chatbot/redis:amd64-only
    platform: linux/amd64
    restart: always
    container_name: ax2-chatbot-redis
    ports:
      - "18090:6379"
    networks:
      - my-network

networks:
  my-network:
    driver: bridge